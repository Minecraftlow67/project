<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecart Mod Controller</title>
    <style>
        :root {
            --bg-color: #0f0f12;
            --panel-color: #17171c;
            --accent-color: #5865f2;
            --danger-color: #ff4757;
            --success-color: #2ed573;
            --text-color: #f1f2f6;
            --muted-color: #a4b0be;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }

        .dashboard {
            width: 100%;
            max-width: 500px;
            background: var(--panel-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid #2f3542;
        }

        h1 {
            font-size: 1.8rem;
            margin-top: 0;
            color: var(--accent-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #2f3542;
        }

        h2 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .control-group {
            margin-bottom: 20px;
        }

        label {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: var(--muted-color);
            margin-bottom: 8px;
        }

        .value-display {
            font-weight: bold;
            color: var(--text-color);
        }

        input[type="range"] {
            width: 100%;
            accent-color: var(--accent-color);
            background: #2f3542;
            height: 6px;
            border-radius: 3px;
            outline: none;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-safe { background: rgba(46, 213, 115, 0.2); color: var(--success-color); }
        .status-risk { background: rgba(255, 71, 87, 0.2); color: var(--danger-color); }

        .output-box {
            background: #0f0f12;
            border: 1px solid #2f3542;
            border-radius: 6px;
            padding: 12px;
            font-family: monospace;
            font-size: 0.85rem;
            color: #7bed9f;
            word-break: break-all;
            margin-top: 15px;
        }

        button {
            width: 100%;
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.95rem;
            transition: opacity 0.2s;
        }

        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>🛠️ Mod Configurator</h1>
        <p style="color: var(--muted-color); font-size: 0.85rem; margin-bottom: 25px;">Adjust your active parameters for the client-side mining/building hooks.</p>

        <!-- MINING CONTROLS -->
        <div class="control-group">
            <label>
                <span>Mining Radius (Area)</span>
                <span class="value-display"><span id="radiusVal">2</span>x2x2</span>
            </label>
            <input type="range" id="radiusInput" min="1" max="5" value="2">
        </div>

        <div class="control-group">
            <label>
                <span>Blocks Broken Per Click (Tick Speed)</span>
                <span class="value-display" id="mineSpeedVal">1</span>
            </label>
            <input type="range" id="mineSpeedInput" min="1" max="10" value="1">
            <div style="margin-top: 8px;">
                <span id="mineAlert" class="status-badge status-safe">Anticheat Safe</span>
            </div>
        </div>

        <!-- BUILDING CONTROLS -->
        <div class="section">
            <h2>🧱 Building Customization</h2>
            <div class="control-group">
                <label>
                    <span>Mirror Offset (X-Axis Distance)</span>
                    <span class="value-display"><span id="buildOffsetVal">2</span> Blocks</span>
                </label>
                <input type="range" id="buildOffsetInput" min="1" max="5" value="2">
            </div>
        </div>

        <!-- EXPORT PROFILE -->
        <div class="section">
            <button id="copyBtn">Copy Config JSON for Mod</button>
            <div class="output-box" id="jsonOutput">{"mineRadius":2,"blocksPerTick":1,"buildOffset":2}</div>
        </div>
    </div>

    <script>
        const radiusInput = document.getElementById('radiusInput');
        const mineSpeedInput = document.getElementById('mineSpeedInput');
        const buildOffsetInput = document.getElementById('buildOffsetInput');

        const radiusVal = document.getElementById('radiusVal');
        const mineSpeedVal = document.getElementById('mineSpeedVal');
        const buildOffsetVal = document.getElementById('buildOffsetVal');
        
        const mineAlert = document.getElementById('mineAlert');
        const jsonOutput = document.getElementById('jsonOutput');
        const copyBtn = document.getElementById('copyBtn');

        function updateConfig() {
            const radius = parseInt(radiusInput.value);
            const mineSpeed = parseInt(mineSpeedInput.value);
            const buildOffset = parseInt(buildOffsetInput.value);

            // Update UI visuals
            radiusVal.innerText = radius;
            mineSpeedVal.innerText = mineSpeed;
            buildOffsetVal.innerText = buildOffset;

            // Anticheat danger scaling evaluation for Minecart SMP boundaries
            if (mineSpeed > 2) {
                mineAlert.innerText = "Anticheat Flag Risk!";
                mineAlert.className = "status-badge status-risk";
            } else {
                mineAlert.innerText = "Anticheat Safe";
                mineAlert.className = "status-badge status-safe";
            }

            // Generate configuration structure readable by the Fabric mod variables
            const config = {
                mineRadius: radius,
                blocksPerTick: mineSpeed,
                buildOffset: buildOffset
            };

            jsonOutput.innerText = JSON.stringify(config);
        }

        // Attach layout events
        radiusInput.addEventListener('input', updateConfig);
        mineSpeedInput.addEventListener('input', updateConfig);
        buildOffsetInput.addEventListener('input', updateConfig);

        copyBtn.addEventListener('click', () => {
            navigator.clipboard.writeText(jsonOutput.innerText);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = "Copied to Clipboard! ✓";
            copyBtn.style.background = "var(--success-color)";
            setTimeout(() => {
                copyBtn.innerText = originalText;
                copyBtn.style.background = "var(--accent-color)";
            }, 1500);
        });

        // Initialize display
        updateConfig();
    </script>
</body>
</html>
