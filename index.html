<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IncognitoSpace | Safe Anonymous Blogging</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0f172a;
            color: #f1f5f9;
            padding-bottom: 60px;
        }

        header {
            background-color: #1e293b;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #334155;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand {
            font-size: 22px;
            font-weight: bold;
            color: #38bdf8;
            letter-spacing: 1px;
        }

        .auth-status {
            background-color: #0284c7;
            color: white;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .auth-status.logged-out {
            background-color: #475569;
        }

        .main-layout {
            max-width: 800px;
            margin: 30px auto;
            padding: 0 20px;
        }

        /* Post Creation Box */
        .create-post-card {
            background-color: #1e293b;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #334155;
            margin-bottom: 30px;
        }

        .create-post-card h3 {
            margin-bottom: 12px;
            font-size: 1.1rem;
            color: #94a3b8;
        }

        .blog-textarea {
            width: 100%;
            height: 100px;
            background-color: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            resize: none;
            outline: none;
            margin-bottom: 15px;
        }
        .blog-textarea:focus {
            border-color: #38bdf8;
        }

        .ai-warning {
            display: none;
            background-color: #7f1d1d;
            border: 1px solid #f87171;
            color: #fca5a5;
            padding: 10px 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.9rem;
        }

        .submit-btn {
            background-color: #10b981;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .submit-btn:hover {
            background-color: #059669;
        }

        /* Feed Post Layout */
        .feed-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .post-card {
            background-color: #1e293b;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 24px;
        }

        .post-author-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            color: #94a3b8;
            font-size: 0.85rem;
        }

        .avatar-anonymous {
            width: 32px;
            height: 32px;
            background-color: #475569;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .post-content {
            font-size: 1.05rem;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        /* Social Request Buttons Grid */
        .actions-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            border-top: 1px solid #334155;
            padding-top: 15px;
        }

        .req-btn {
            background-color: #27272a;
            border: 1px solid #3f3f46;
            color: #cbd5e1;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }
        .req-btn:hover {
            background-color: #3f3f46;
            border-color: #52525b;
        }
        .req-btn.success-sent {
            background-color: #065f46 !important;
            border-color: #047857 !important;
            color: #a7f3d0;
            cursor: default;
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">🕵️ IncognitoSpace</div>
        <button id="authBtn" class="auth-status" onclick="toggleSimulatedAuth()">Logged In (Account Active)</button>
    </header>

    <div class="main-layout">
        
        <div class="create-post-card">
            <h3>Share your thoughts anonymously...</h3>
            <textarea id="postText" class="blog-textarea" placeholder="What's on your mind? AI will review your post for attacking language before uploading..."></textarea>
            
            <div id="aiWarningBox" class="ai-warning">
                ⚠️ **AI Moderation Flag:** Your post contains toxic, aggressive, or attacking words. Please rephrase your thoughts constructively to post.
            </div>
            
            <button class="submit-btn" onclick="processAIUpload()">Publish Anonymously</button>
        </div>

        <h2>Recent Anonymous Blogs</h2>
        <div style="height:15px;"></div>
        <div class="feed-container" id="feedContainer"></div>

    </div>

    <script type="module">
// Import the functions you need from the SDKs you need
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  // Your web app's Firebase configuration
  const firebaseConfig = {
    apiKey: "AIzaSyC5EdS6551xI9gpY2mk7JUpEb1cml9Rdjo",
    authDomain: "bloggy-pro-17d46.firebaseapp.com",
    databaseURL: "https://bloggy-pro-17d46-default-rtdb.firebaseio.com",
    projectId: "bloggy-pro-17d46",
    storageBucket: "bloggy-pro-17d46.firebasestorage.app",
    messagingSenderId: "46665238444",
    appId: "1:46665238444:web:5d1a5ef242961af2025c09"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);
  const database = getDatabase(app);

  // Track whether simulated user is currently signed in
  let isLoggedIn = true;

  // Simple Simulated dictionary array of toxic attacking words
  const badWordDictionary = ["hate", "stupid", "ugly", "kill", "idiot", "trash", "loser", "dumb"];

  // Preloaded feed database mock
  const mockFeed = [
    { id: 101, content: "Honestly, sometimes I feel like I'm trying way too hard at work and nobody notices. Just needed to vent it out somewhere safe." },
    { id: 102, content: "To whoever found a lost grey cat near the park yesterday, thank you so much for bringing it to the shelter safely!" }
  ];
        function toggleSimulatedAuth() {
            const btn = document.getElementById('authBtn');
            isLoggedIn = !isLoggedIn;
            
            if(isLoggedIn) {
                btn.className = "auth-status";
                btn.innerText = "Logged In (Account Active)";
            } else {
                btn.className = "auth-status logged-out";
                btn.innerText = "Signed Out (Guest View)";
            }
        }

        function renderFeed() {
            const container = document.getElementById('feedContainer');
            container.innerHTML = "";

            mockFeed.forEach(post => {
                const card = document.createElement('div');
                card.className = "post-card";
                card.innerHTML = `
                    <div class="post-author-row">
                        <div class="avatar-anonymous">?</div>
                        <span>Posted Anonymously • Just Now</span>
                    </div>
                    <div class="post-content">${post.content}</div>
                    
                    <div class="actions-grid">
                        <button class="req-btn" onclick="handleSocialAction(this, 'Chat Request Sent!')">💬 Request Private Chat</button>
                        <button class="req-btn" onclick="handleSocialAction(this, 'Identity Request Sent!')">🆔 Ask for Username/Age</button>
                        <button class="req-btn" onclick="handleSocialAction(this, 'Gift Location Request Sent!')">🎁 Request Delivery Location</button>
                    </div>
                `;
                container.prepend(card); // Puts newest at top
            });
        }

        // AI Moderation Simulation Engine
        function processAIUpload() {
            const textarea = document.getElementById('postText');
            const warningBox = document.getElementById('aiWarningBox');
            const rawText = textarea.value.trim();

            if(!rawText) return;

            // Turn text lowercase to cross-reference our toxic word matrix
            const parsedText = rawText.toLowerCase();
            let containsAttackingWords = badWordDictionary.some(word => parsedText.includes(word));

            if(containsAttackingWords) {
                // Flash AI Flag Block Warning
                warningBox.style.display = "block";
            } else {
                // Clear warning, push into local feed array, and clear textarea
                warningBox.style.display = "none";
                mockFeed.push({ id: Date.now(), content: rawText });
                textarea.value = "";
                renderFeed();
            }
        }

        // Guarded Request Action Controller
        function handleSocialAction(buttonElement, successMessage) {
            // Guardrail Check: Only signed-in users can initiate requests
            if(!isLoggedIn) {
                alert("🔒 Access Denied: You must be a signed-in account holder to send private interactive user requests.");
                return;
            }

            // Visual confirmation execution
            buttonElement.className = "req-btn success-sent";
            buttonElement.innerText = `✓ ${successMessage}`;
            buttonElement.disabled = true;
        }

        // Initial Boot Render
        renderFeed();
    </script>
</body>
</html>
