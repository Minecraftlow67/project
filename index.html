<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZenSpace | Custom Voice & Colors</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background: linear-gradient(135deg, #1a1c29 0%, #2a3447 100%);
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }

        header {
            text-align: center;
            padding: 30px 20px;
        }

        header h1 {
            font-size: 2.5rem;
            color: #a7f3d0;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        /* Navigation */
        .nav-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            background: rgba(255, 255, 255, 0.05);
            padding: 8px;
            border-radius: 30px;
            backdrop-filter: blur(10px);
        }

        .tab-btn {
            background: none;
            border: none;
            color: #94a3b8;
            padding: 12px 24px;
            font-size: 1rem;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background-color: #34d399;
            color: #0f172a;
            font-weight: 600;
            box-shadow: 0 4px 14px rgba(52, 211, 153, 0.4);
        }

        .container {
            width: 100%;
            max-width: 650px;
            padding: 0 20px;
        }

        .game-panel {
            display: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 35px 25px;
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            text-align: center;
        }

        .game-panel.active {
            display: block;
            animation: panelFadeIn 0.5s ease-out;
        }

        @keyframes panelFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Customization Controls Panel */
        .controls-bar {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            justify-content: space-around;
            align-items: center;
            font-size: 0.9rem;
        }

        .control-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        input[type="range"] {
            accent-color: #34d399;
            cursor: pointer;
        }

        input[type="color"] {
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            background: none;
        }

        /* Voice Rec Button States */
        .rec-btn {
            background-color: #ef4444;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.2s;
        }
        .rec-btn.recording {
            animation: pulseRed 1s infinite alternate;
            background-color: #b91c1c;
        }
        @keyframes pulseRed {
            from { opacity: 0.6; } to { opacity: 1; }
        }

        /* Bubble Wrap Core Setup */
        .bubble-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 12px;
            margin-bottom: 20px;
            touch-action: none;
        }

        .bubble {
            aspect-ratio: 1;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.3), rgba(0,0,0,0.2)), var(--bubble-color, #3b82f6);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: inset -3px -3px 8px rgba(0,0,0,0.4), 2px 2px 6px rgba(0,0,0,0.3);
            transition: transform 0.05s ease;
        }

        .bubble.popped {
            background: #1e293b !important;
            box-shadow: inset 3px 3px 6px rgba(0,0,0,0.6);
            transform: scale(0.93);
            cursor: default;
        }

        .action-btn {
            background-color: #3a3f47;
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            padding: 10px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        /* Worry Shredder Animated States */
        .worry-box {
            width: 100%;
            height: 120px;
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-size: 1rem;
            resize: none;
            outline: none;
            margin-bottom: 20px;
            transform-origin: center;
        }

        /* Worry Cloud Animation Sequences */
        .shredding {
            animation: shakeShred 0.8s ease-in-out forwards;
        }

        @keyframes shakeShred {
            0%, 100% { transform: translate(0, 0) scale(1); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-8px, 2px) rotate(-1deg); }
            20%, 40%, 60%, 80% { transform: translate(8px, -2px) rotate(1deg); }
            100% { transform: scale(0) translateY(-100px); opacity: 0; filter: blur(15px); }
        }

        .shred-btn {
            background-color: #f43f5e;
            color: white;
            border: none;
            padding: 12px 28px;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(244, 63, 94, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <h1>ZenSpace</h1>
        <p>Customizable Sensory Anti-Stress Studio</p>
    </header>

    <nav class="nav-tabs">
        <button class="tab-btn active" onclick="switchTab('wrap')">Bubble Wrap</button>
        <button class="tab-btn" onclick="switchTab('shredder')">Worry Cloud</button>
    </nav>

    <div class="container">
        <div id="wrapPanel" class="game-panel active">
            
            <div class="controls-bar">
                <div class="control-item">
                    <label>Size:</label>
                    <input type="range" id="sizeSlider" min="12" max="72" step="6" value="30" oninput="updateGridSize(this.value)">
                    <span id="sizeVal">30</span>
                </div>
                <div class="control-item">
                    <label>Color:</label>
                    <input type="color" id="colorPicker" value="#3b82f6" oninput="updateColor(this.value)">
                </div>
                <div class="control-item">
                    <button class="rec-btn" id="recBtn" onclick="toggleVoiceRecording()">🎙️ Record Voice Pop</button>
                </div>
            </div>

            <div class="bubble-grid" id="bubbleGrid"></div>
            <button class="action-btn" onclick="resetBubbleWrap()">Reset Sheet</button>
        </div>

        <div id="shredderPanel" class="game-panel">
            <h2>Worry Dissolve Cloud</h2>
            <p style="color:#94a3b8; font-size:0.9rem; margin-bottom:20px;">Type out what is stressing you. Watch it shake apart and disappear forever.</p>
            <textarea class="worry-box" id="worryInput" placeholder="Type your stress here..."></textarea>
            <div>
                <button class="shred-btn" onclick="animateAndShred()">Release to Cloud</button>
            </div>
        </div>
    </div>

    <script>
        let isDrawing = false;
        let currentSize = 30;
        let currentColor = "#3b82f6";
        
        // Voice Capture Variables
        let mediaRecorder;
        let audioChunks = [];
        let voiceAudioBuffer = null;
        let useVoicePop = false;
        let audioCtxInstance = null;

        window.addEventListener('pointerdown', () => isDrawing = true);
        window.addEventListener('pointerup', () => isDrawing = false);

        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.game-panel').forEach(panel => panel.classList.remove('active'));
            event.target.classList.add('active');
            if(tabName === 'wrap') document.getElementById('wrapPanel').classList.add('active');
            if(tabName === 'shredder') document.getElementById('shredderPanel').classList.add('active');
        }

        function updateColor(val) {
            currentColor = val;
            document.getElementById('bubbleGrid').style.setProperty('--bubble-color', val);
        }

        function updateGridSize(val) {
            currentSize = val;
            document.getElementById('sizeVal').innerText = val;
            buildWrap();
        }

        // --- CORE CRYSTAL POP AUDIO ENGINE ---
        function playPopSound() {
            if (!audioCtxInstance) audioCtxInstance = new (window.AudioContext || window.webkitAudioContext)();
            const ctx = audioCtxInstance;

            // IF Custom Voice is Recorded and Loaded, play it!
            if (useVoicePop && voiceAudioBuffer) {
                const playSource = ctx.createBufferSource();
                playSource.buffer = voiceAudioBuffer;
                playSource.connect(ctx.destination);
                playSource.start(0);
                return;
            }

            // Fallback Crystal Pop Synthesizer
            const oscEle = ctx.createOscillator();
            const gainEle = ctx.createGain();
            oscEle.type = 'triangle';
            oscEle.frequency.setValueAtTime(950, ctx.currentTime);
            oscEle.frequency.exponentialRampToValueAtTime(1600, ctx.currentTime + 0.008);
            gainEle.gain.setValueAtTime(0.35, ctx.currentTime);
            gainEle.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.012);
            oscEle.connect(gainEle);
            gainEle.connect(ctx.destination);

            const oscAir = ctx.createOscillator();
            const gainAir = ctx.createGain();
            oscAir.type = 'sine';
            oscAir.frequency.setValueAtTime(180, ctx.currentTime);
            oscAir.frequency.exponentialRampToValueAtTime(80, ctx.currentTime + 0.02);
            gainAir.gain.setValueAtTime(0.5, ctx.currentTime);
            gainAir.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.025);
            oscAir.connect(gainAir);
            gainAir.connect(ctx.destination);

            oscEle.start(); oscAir.start();
            oscEle.stop(ctx.currentTime + 0.03); oscAir.stop(ctx.currentTime + 0.03);
        }

        // --- VOICE CAPTURE HANDLER ---
        function toggleVoiceRecording() {
            const btn = document.getElementById('recBtn');
            if (!audioCtxInstance) audioCtxInstance = new (window.AudioContext || window.webkitAudioContext)();

            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                btn.classList.remove('recording');
                btn.innerText = "🎙️ Voice Pop Active!";
                useVoicePop = true;
            } else {
                navigator.mediaDevices.getUserMedia({ audio: true })
                    .then(stream => {
                        audioChunks = [];
                        mediaRecorder = new MediaRecorder(stream);
                        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                        mediaRecorder.onstop = () => {
                            const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                            audioBlob.arrayBuffer().then(buffer => {
                                audioCtxInstance.decodeAudioData(buffer, (decoded) => {
                                    voiceAudioBuffer = decoded;
                                });
                            });
                        };
                        mediaRecorder.start();
                        btn.classList.add('recording');
                        btn.innerText = "🛑 Stop (Record 1s)";
                    }).catch(err => alert("Microphone access denied or unsupported."));
            }
        }

        // --- BUBBLE GENERATOR ENGINE ---
        const grid = document.getElementById('bubbleGrid');

        function buildWrap() {
            grid.innerHTML = '';
            grid.style.setProperty('--bubble-color', currentColor);
            
            for (let i = 0; i < currentSize; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                
                const triggerPop = (target) => {
                    if(!target.classList.contains('popped')) {
                        target.classList.add('popped');
                        playPopSound();
                    }
                };

                bubble.addEventListener('pointerover', function() { if (isDrawing) triggerPop(this); });
                bubble.addEventListener('pointerdown', function() { triggerPop(this); });
                grid.appendChild(bubble);
            }
        }

        function resetBubbleWrap() { buildWrap(); }

        // --- WORRY SHREDDER SYSTEM WITH ANIMATION ---
        function animateAndShred() {
            const box = document.getElementById('worryInput');
            if(!box.value.trim()) return;

            // Apply shaking visual css rule class
            box.classList.add('shredding');

            setTimeout(() => {
                box.value = '';
                box.classList.remove('shredding');
            }, 850);
        }

        buildWrap();
    </script>
</body>
</html>
