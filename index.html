<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customizable Clicker Deluxe</title>
  <style>
    :root {
      --bg-color: #0f172a;
      --card-bg: #1e293b;
      --accent: #38bdf8;
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
      --gold: #f59e0b;
      
      /* Customizable Button Properties */
      --btn-color: #38bdf8;
      --btn-shape: 50%; /* Circle by default */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      user-select: none;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      max-width: 950px;
      width: 100%;
    }

    @media (max-width: 768px) {
      .container {
        grid-template-columns: 1fr;
      }
    }

    .panel {
      background-color: var(--card-bg);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .score-display {
      text-align: center;
      margin-bottom: 20px;
    }

    .score-display h1 {
      font-size: 2.8rem;
      color: var(--accent);
    }

    .record-box {
      margin-top: 8px;
      font-size: 0.95rem;
      color: var(--gold);
      font-weight: bold;
    }

    /* Main Dynamic Click Button */
    .click-btn-container {
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }

    .click-btn {
      width: 150px;
      height: 150px;
      border-radius: var(--btn-shape);
      border: none;
      background-color: var(--btn-color);
      color: #000;
      font-size: 1.5rem;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.4);
      transition: transform 0.05s, background-color 0.2s, border-radius 0.2s;
    }

    .click-btn:active {
      transform: scale(0.92);
    }

    /* Customization Section */
    .custom-box {
      width: 100%;
      background-color: #0f172a;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 14px;
      margin-top: auto;
    }

    .custom-box h3 {
      font-size: 0.95rem;
      margin-bottom: 10px;
      color: var(--text-muted);
    }

    .custom-controls {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .color-picker-group, .shape-picker-group {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
    }

    select, input[type="color"] {
      background-color: #1e293b;
      color: #fff;
      border: 1px solid #334155;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
    }

    /* Shop Section */
    .shop-title {
      font-size: 1.4rem;
      margin-bottom: 16px;
      width: 100%;
      border-bottom: 2px solid #334155;
      padding-bottom: 8px;
    }

    .powerup-list {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-height: 480px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .powerup-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: #0f172a;
      padding: 12px 16px;
      border-radius: 8px;
      border: 1px solid #334155;
    }

    .powerup-info h4 {
      color: var(--text-main);
      font-size: 0.95rem;
    }

    .powerup-info p {
      color: var(--text-muted);
      font-size: 0.8rem;
    }

    .buy-btn {
      background-color: var(--accent);
      color: #000;
      border: none;
      padding: 8px 12px;
      border-radius: 6px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      min-width: 80px;
    }

    .buy-btn:hover:not(:disabled) {
      filter: brightness(1.1);
    }

    .buy-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
  </style>
</head>
<body>

  <div class="container">
    <!-- Left: Gameplay & Customization Panel -->
    <div class="panel">
      <div class="score-display">
        <p style="color: var(--text-muted);">Total Clicks</p>
        <h1 id="click-count">0</h1>
        <p style="font-size: 0.85rem; color: var(--text-muted);" id="cps-display">0 clicks/sec</p>
        <div class="record-box">🏆 World Record: <span id="record-count">0</span></div>
      </div>

      <div class="click-btn-container">
        <button class="click-btn" id="main-click-btn">CLICK!</button>
      </div>

      <!-- Customization Box -->
      <div class="custom-box">
        <h3>🎨 Customize Button</h3>
        <div class="custom-controls">
          <div class="color-picker-group">
            <label for="btn-color">Color:</label>
            <input type="color" id="btn-color" value="#38bdf8">
          </div>
          <div class="shape-picker-group">
            <label for="btn-shape">Shape:</label>
            <select id="btn-shape">
              <option value="50%">Circle</option>
              <option value="20%">Rounded Square</option>
              <option value="0%">Square</option>
              <option value="50% 20%">Capsule / Oval</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- Right: Expanded Power-Up Shop -->
    <div class="panel">
      <h2 class="shop-title">Power-Up Shop</h2>
      <div class="powerup-list" id="shop-container">
        <!-- Power-ups populated dynamically via JavaScript -->
      </div>
    </div>
  </div>

  <script>
    // Game State
    let clicks = 0;
    let clickValue = 1;
    let autoCPS = 0;
    let worldRecord = parseInt(localStorage.getItem('clicker_world_record')) || 0;

    // Power-Up Configurations (Boosts & Costs scale exponentially)
    const powerups = [
      { id: 'tap_boost', name: 'Tap Multiplier', desc: 'Increases tap yield', type: 'tap', baseCost: 15, costMult: 1.5, baseBoost: 1, boostMult: 1.25, count: 0 },
      { id: 'auto_clicker', name: 'Auto-Bot', desc: 'Adds clicks every second', type: 'auto', baseCost: 50, costMult: 1.6, baseBoost: 1, boostMult: 1.3, count: 0 },
      { id: 'power_glove', name: 'Power Glove', desc: 'Massive boost to tap yield', type: 'tap', baseCost: 250, costMult: 1.7, baseBoost: 8, boostMult: 1.35, count: 0 },
      { id: 'click_factory', name: 'Click Factory', desc: 'Generates heavy CPS', type: 'auto', baseCost: 1200, costMult: 1.8, baseBoost: 25, boostMult: 1.4, count: 0 },
      { id: 'quantum_overclock', name: 'Quantum Overclock', desc: 'Godly boost to both taps & CPS', type: 'both', baseCost: 8000, costMult: 2.0, baseBoost: 100, boostMult: 1.5, count: 0 }
    ];

    // DOM Elements
    const clickDisplay = document.getElementById('click-count');
    const cpsDisplay = document.getElementById('cps-display');
    const recordDisplay = document.getElementById('record-count');
    const mainBtn = document.getElementById('main-click-btn');
    const shopContainer = document.getElementById('shop-container');
    const colorPicker = document.getElementById('btn-color');
    const shapePicker = document.getElementById('btn-shape');

    // Calculate current cost and boost for a powerup based on level
    function getPowerupMetrics(p) {
      const currentCost = Math.floor(p.baseCost * Math.pow(p.costMult, p.count));
      const currentBoost = Math.floor(p.baseBoost * Math.pow(p.boostMult, p.count));
      return { currentCost, currentBoost };
    }

    // Recalculate Total Stats
    function recalculateStats() {
      let newClickVal = 1;
      let newCPS = 0;

      powerups.forEach(p => {
        if (p.count > 0) {
          // Total output from all bought levels
          for (let i = 0; i < p.count; i++) {
            const boostAtLevel = Math.floor(p.baseBoost * Math.pow(p.boostMult, i));
            if (p.type === 'tap' || p.type === 'both') newClickVal += boostAtLevel;
            if (p.type === 'auto' || p.type === 'both') newCPS += boostAtLevel;
          }
        }
      });

      clickValue = newClickVal;
      autoCPS = newCPS;
    }

    // Build Shop UI Elements
    function initShop() {
      shopContainer.innerHTML = '';
      powerups.forEach((p, index) => {
        const item = document.createElement('div');
        item.className = 'powerup-item';
        item.innerHTML = `
          <div class="powerup-info">
            <h4>${p.name}</h4>
            <p>${p.desc}</p>
            <p style="color: var(--accent);" id="cost-${p.id}">Cost: 0</p>
            <p style="color: var(--gold); font-size: 0.75rem;" id="boost-${p.id}">Next Boost: +0</p>
          </div>
          <button class="buy-btn" id="buy-${p.id}" onclick="buyPowerup(${index})">Buy (0)</button>
        `;
        shopContainer.appendChild(item);
      });
    }

    // Update UI Elements
    function updateUI() {
      clickDisplay.textContent = Math.floor(clicks);
      recordDisplay.textContent = worldRecord;
      cpsDisplay.textContent = `${autoCPS} clicks/sec`;

      powerups.forEach(p => {
        const { currentCost, currentBoost } = getPowerupMetrics(p);
        const costText = document.getElementById(`cost-${p.id}`);
        const boostText = document.getElementById(`boost-${p.id}`);
        const buyBtn = document.getElementById(`buy-${p.id}`);

        if (costText) costText.textContent = `Cost: ${currentCost}`;
        if (boostText) boostText.textContent = `Next Boost: +${currentBoost} ${p.type === 'auto' ? 'CPS' : 'Per Tap'}`;
        if (buyBtn) {
          buyBtn.textContent = `Lvl ${p.count}`;
          buyBtn.disabled = clicks < currentCost;
        }
      });
    }

    // Buy Powerup
    window.buyPowerup = function(index) {
      const p = powerups[index];
      const { currentCost } = getPowerupMetrics(p);

      if (clicks >= currentCost) {
        clicks -= currentCost;
        p.count++;
        recalculateStats();
        checkRecord();
        updateUI();
      }
    };

    // Check & Save World Record
    function checkRecord() {
      if (clicks > worldRecord) {
        worldRecord = Math.floor(clicks);
        localStorage.setItem('clicker_world_record', worldRecord);
      }
    }

    // Click Event
    mainBtn.addEventListener('click', () => {
      clicks += clickValue;
      checkRecord();
      updateUI();
    });

    // Customization Event Listeners
    colorPicker.addEventListener('input', (e) => {
      document.documentElement.style.setProperty('--btn-color', e.target.value);
    });

    shapePicker.addEventListener('change', (e) => {
      document.documentElement.style.setProperty('--btn-shape', e.target.value);
    });

    // Auto-Clicker Loop (1-second tick)
    setInterval(() => {
      if (autoCPS > 0) {
        clicks += autoCPS;
        checkRecord();
        updateUI();
      }
    }, 1000);

    // Initial Startup
    initShop();
    recalculateStats();
    updateUI();
  </script>
</body>
</html>
