<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokiClone | Play Free Online Games</title>
    <meta name="description" content="Play the best free online games on PokiClone. Subway Surfers, arcade games, puzzles, and 3D shooters instantly in your browser!">
    <meta name="keywords" content="free online games, browser games, unblocked games, subway surfers web, poki clone, play games online">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #2a2d32;
            color: #fff;
            padding-bottom: 50px;
        }

        /* Poki/CrazyGames Header */
        header {
            background-color: #1c1e22;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            color: #00ff66;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
        }

        .search-bar {
            width: 40%;
            padding: 10px 20px;
            border-radius: 20px;
            border: none;
            background-color: #3a3f47;
            color: white;
            font-size: 16px;
            outline: none;
        }

        /* Mosaic Layout Styling */
        .container {
            max-width: 1400px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            grid-gap: 18px;
            grid-auto-flow: dense;
        }

        .game-card {
            background-color: #3a3f47;
            border-radius: 16px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
            aspect-ratio: 1 / 1;
        }

        .game-card:hover {
            transform: scale(1.06);
            box-shadow: 0 12px 24px rgba(0,0,0,0.5);
        }

        /* Random larger elements for asynchronous grid look */
        .game-card.large {
            grid-column: span 2;
            grid-row: span 2;
        }

        .game-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 15px 10px 10px 10px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
        }

        /* Immersive Iframe Overlay Player */
        .modal {
            display: none; 
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 15, 18, 0.95);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        .modal-content {
            position: relative;
            width: 85%;
            height: 80%;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }

        .close-btn {
            margin-bottom: 15px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            background-color: #ff3366;
            border: none;
            padding: 10px 24px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        .close-btn:hover {
            background-color: #ff0044;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo" onclick="location.reload()">PokiClone</div>
        <input type="text" id="searchInput" class="search-bar" placeholder="Search for real games...">
        <div style="width: 80px;"></div>
    </header>

    <div class="container">
        <main class="game-grid" id="gameGrid"></main>
    </div>

    <!-- Active Overlay Player -->
    <div class="modal" id="gameModal">
        <button class="close-btn" onclick="closeGame()">✖ BACK TO GAMES</button>
        <div class="modal-content">
            <iframe id="gameFrame" src="" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        // Updated data array with distinct functional game URLs
        const realGames = [
            { id: 1, title: "Subway Surfers", img: "https://images.unsplash.com/photo-1551103782-8ab07afd45c1?w=400", url: "https://eeshadutta.github.io/Subway-Surfers/", size: "large" },
            { id: 2, title: "Hextris (Geometry Tetris)", img: "https://images.unsplash.com/photo-1614850523459-c2f4c699c52e?w=400", url: "https://hextris.github.io/hextris/", size: "large" },
            { id: 3, title: "Classic 2048", img: "https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400", url: "https://thedoggybrad.github.io/2048ontheweb/", size: "normal" },
            { id: 4, title: "Astray (3D Ball Roll)", img: "https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400", url: "https://wwwtyro.github.io/Astray/", size: "large" },
            { id: 5, title: "Blockrain Tetris", img: "https://images.unsplash.com/photo-1606167668584-78701c57f13d?w=400", url: "https://aerolab.github.io/blockrain.js/", size: "normal" },
            { id: 6, title: "Flappy Bird Clone", img: "https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400", url: "https://nebez.github.io/floppybird/", size: "normal" },
            { id: 7, title: "Pacman Retro", img: "https://images.unsplash.com/photo-1534447677768-be436bb09401?w=400", url: "https://mumuy.github.io/pacman/", size: "normal" },
            { id: 8, title: "Chromium Dino Run", img: "https://images.unsplash.com/photo-1560253023-3ec5d502959f?w=400", url: "https://wayou.github.io/t-rex-runner/", size: "normal" }
        ];

        const grid = document.getElementById('gameGrid');
        const modal = document.getElementById('gameModal');
        const iframe = document.getElementById('gameFrame');
        const searchInput = document.getElementById('searchInput');

        function displayGames(gamesArray) {
            grid.innerHTML = "";
            gamesArray.forEach(game => {
                const card = document.createElement('div');
                card.className = `game-card ${game.size}`;
                card.onclick = () => openGame(game.url);
                
                card.innerHTML = `
                    <img src="${game.img}" alt="${game.title}">
                    <div class="game-title">${game.title}</div>
                `;
                grid.appendChild(card);
            });
        }

        searchInput.addEventListener('input', (e) => {
            const query = e.target.value.toLowerCase();
            const filtered = realGames.filter(g => g.title.toLowerCase().includes(query));
            displayGames(filtered);
        });

        function openGame(url) {
            iframe.src = url;
            modal.style.display = "flex";
        }

        function closeGame() {
            modal.style.display = "none";
            iframe.src = ""; 
        }

        displayGames(realGames);
    </script>
</body>
</html>
